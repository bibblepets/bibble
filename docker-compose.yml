version: '3'

services:
  bibble-client:
    image: bibble-client
    container_name: bibble-client
    build:
      context: ./bibble-client
    ports:
      - '3000:3000'
    volumes:
      - ./bibble-client:/usr/src/app
      - /usr/src/app/node_modules
    networks:
      - bibble-network

  bibble-kennel-api:
    image: bibble-kennel-api
    container_name: bibble-kennel-api
    build:
      context: ./bibble-kennel-api
    ports:
      - '8000:8000'
    logging:
      driver: json-file
    volumes:
      - ./bibble-kennel-api:/usr/src/app
      - /usr/src/app/node_modules
    networks:
      - bibble-network
    depends_on:
      - bibble-kennel-mongo

  bibble-kennel-mongo:
    image: mongo:latest
    container_name: bibble-kennel-mongo
    ports:
      - '27017:27017'
    volumes:
      - bibble-kennel-mongo-data:/data/db
    networks:
      - bibble-network

  bibble-nginx:
    image: nginx:latest
    container_name: bibble-nginx
    ports:
      - '443:443' # Expose Nginx on port 443
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf # Mount the Nginx configuration file
    networks:
      - bibble-network
    depends_on:
      - bibble-client # Wait until Client app container is up
      - bibble-kennel-api # Wait until Server app container is up

networks:
  bibble-network:
    driver: bridge

volumes:
  bibble-kennel-mongo-data:
    driver: local
